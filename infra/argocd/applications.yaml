apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudmart-staging
  namespace: argocd
  annotations:
    notifications.argoproj.io/subscribe.on-sync-succeeded.slack: cloudmart-deploys
spec:
  project: cloudmart
  source:
    repoURL: https://github.com/your-org/cloudmart.git
    targetRevision: main
    path: k8s/base
  destination:
    server: https://kubernetes.default.svc
    namespace: cloudmart
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudmart-istio
  namespace: argocd
spec:
  project: cloudmart
  source:
    repoURL: https://github.com/your-org/cloudmart.git
    targetRevision: main
    path: k8s/istio
  destination:
    server: https://kubernetes.default.svc
    namespace: cloudmart
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
