apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: cloudmart
  labels:
    app: notification-service
    version: v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
        version: v1
    spec:
      containers:
        - name: notification-service
          image: cloudmart/notification-service:latest
          ports:
            - containerPort: 8086
          envFrom:
            - configMapRef:
                name: cloudmart-config
          env:
            - name: PORT
              value: "8086"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8086
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8086
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: cloudmart
spec:
  selector:
    app: notification-service
  ports:
    - port: 8086
      targetPort: 8086
      name: http
